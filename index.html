<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Marathon — 17-Week Training Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Custom Properties ── */
    :root {
      --base: #0A0A0A;
      --surface: #111111;
      --card: #1A1A1A;
      --border: #2A2A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #CCCCCC;
      --text-muted: #888888;
      --text-dim: #555555;
      --primary: #FF6A00;
      --danger: #FF3B30;
      --success: #34C759;
      --warning: #FFD60A;
      --z2: #34C759;
      --z3: #FFD60A;
      --z4: #FF6A00;
      --z5: #FF3B30;
    }

    /* ── CSS Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--base);
      color: var(--text-secondary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── Typography Classes ── */
    .phase-heading {
      font-weight: 900;
      font-size: clamp(40px, 6vw, 64px);
      text-transform: uppercase;
      letter-spacing: -2px;
      color: var(--text-primary);
    }

    .section-title {
      font-weight: 700;
      font-size: clamp(24px, 4vw, 36px);
      color: var(--text-primary);
    }

    .week-heading {
      font-weight: 600;
      font-size: 20px;
      color: var(--text-primary);
    }

    .data-mono {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--primary);
    }

    .label {
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Layout Utilities ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section {
      padding: 120px 0;
    }

    /* ── Card Styles ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 24px;
    }

    /* ── Session Type Color Classes ── */
    .session-easy {
      color: var(--text-secondary);
    }

    .session-quality {
      color: var(--primary);
    }

    .session-long {
      color: var(--primary);
      font-weight: 600;
    }

    .session-rest {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .session-strength {
      color: var(--text-muted);
    }

    /* ── Zone Color Classes ── */
    .zone-2 {
      color: var(--z2);
    }

    .zone-3 {
      color: var(--z3);
    }

    .zone-4 {
      color: var(--z4);
    }

    .zone-5 {
      color: var(--z5);
    }

    /* ── Badge Styles ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .badge-stepback {
      color: var(--warning);
      background: rgba(255, 214, 10, 0.1);
      border: 1px solid rgba(255, 214, 10, 0.2);
    }

    /* ── Sticky Navigation ── */
    .sticky-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-title {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .nav-progress {
      flex: 1;
      max-width: 200px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 24px;
      overflow: hidden;
    }

    .nav-progress-bar {
      height: 100%;
      width: 100%;
      background: var(--primary);
      border-radius: 2px;
      transform-origin: left;
      transform: scaleX(0);
      animation: progress-fill linear;
      animation-timeline: scroll();
    }

    @keyframes progress-fill {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    .nav-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 12px;
      color: var(--primary);
      letter-spacing: 1px;
    }

    /* ── Hero Section ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-top: 48px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255, 106, 0, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 59, 48, 0.05) 0%, transparent 50%),
        linear-gradient(135deg, #0a0a0a 0%, #111118 50%, #0a0a0a 100%);
    }

    .hero-content {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .hero-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 900;
      font-size: clamp(40px, 8vw, 80px);
      letter-spacing: -3px;
      line-height: 0.95;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .hero-divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--danger));
      margin: 32px auto;
      border-radius: 2px;
    }

    .hero-subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-top: 48px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hero-stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 28px;
      color: var(--primary);
    }

    .hero-stat-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .hero-stat-separator {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .hero-countdown {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .hero-countdown-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 64px;
      color: var(--text-primary);
      animation: pulse 3s ease-in-out infinite;
    }

    .hero-countdown-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .hero-scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hero-scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid var(--text-dim);
      border-bottom: 2px solid var(--text-dim);
      transform: rotate(45deg);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: 0.5; }
      50% { transform: rotate(45deg) translate(5px, 5px); opacity: 1; }
    }
  </style>
</head>
<body>

<nav class="sticky-nav">
  <div class="nav-inner">
    <div class="nav-title">SF MARATHON PLAN</div>
    <div class="nav-progress">
      <div class="nav-progress-bar"></div>
    </div>
    <div class="nav-countdown">118 DAYS</div>
  </div>
</nav>

  <section id="hero" class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-label">July 27, 2026</div>
      <h1 class="hero-title">SAN FRANCISCO<br/>MARATHON</h1>
      <div class="hero-divider"></div>
      <p class="hero-subtitle">17-Week Training Plan</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-value">51.6</span>
          <span class="hero-stat-label">VO2max</span>
        </div>
        <div class="hero-stat-separator"></div>
        <div class="hero-stat">
          <span class="hero-stat-value">13</span>
          <span class="hero-stat-label">mi/wk current</span>
        </div>
        <div class="hero-stat-separator"></div>
        <div class="hero-stat">
          <span class="hero-stat-value">4:00</span>
          <span class="hero-stat-label">target finish</span>
        </div>
      </div>
      <div class="hero-countdown">
        <span class="hero-countdown-number">118</span>
        <span class="hero-countdown-label">days to race</span>
      </div>
      <div class="hero-scroll-indicator">
        <div class="hero-scroll-arrow"></div>
      </div>
    </div>
  </section>

  <section id="overview" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-1" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-2" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-3" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-4" class="section">
    <div class="container"></div>
  </section>

  <section id="course-map" class="section">
    <div class="container"></div>
  </section>

  <section id="race-day" class="section">
    <div class="container"></div>
  </section>

  <section id="hill-programming" class="section">
    <div class="container"></div>
  </section>

  <section id="strength" class="section">
    <div class="container"></div>
  </section>

  <section id="nutrition" class="section">
    <div class="container"></div>
  </section>

  <section id="risk-management" class="section">
    <div class="container"></div>
  </section>

</body>
</html>
