<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Marathon — 17-Week Training Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Custom Properties ── */
    :root {
      --base: #0A0A0A;
      --surface: #111111;
      --card: #1A1A1A;
      --border: #2A2A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #CCCCCC;
      --text-muted: #888888;
      --text-dim: #555555;
      --primary: #FF6A00;
      --danger: #FF3B30;
      --success: #34C759;
      --warning: #FFD60A;
      --z2: #34C759;
      --z3: #FFD60A;
      --z4: #FF6A00;
      --z5: #FF3B30;
    }

    /* ── CSS Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--base);
      color: var(--text-secondary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── Typography Classes ── */
    .phase-heading {
      font-weight: 900;
      font-size: clamp(40px, 6vw, 64px);
      text-transform: uppercase;
      letter-spacing: -2px;
      color: var(--text-primary);
    }

    .section-title {
      font-weight: 700;
      font-size: clamp(24px, 4vw, 36px);
      color: var(--text-primary);
    }

    .week-heading {
      font-weight: 600;
      font-size: 20px;
      color: var(--text-primary);
    }

    .data-mono {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--primary);
    }

    .label {
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Layout Utilities ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section {
      padding: 120px 0;
    }

    /* ── Card Styles ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 24px;
    }

    /* ── Session Type Color Classes ── */
    .session-easy {
      color: var(--text-secondary);
    }

    .session-quality {
      color: var(--primary);
    }

    .session-long {
      color: var(--primary);
      font-weight: 600;
    }

    .session-rest {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .session-strength {
      color: var(--text-muted);
    }

    /* ── Zone Color Classes ── */
    .zone-2 {
      color: var(--z2);
    }

    .zone-3 {
      color: var(--z3);
    }

    .zone-4 {
      color: var(--z4);
    }

    .zone-5 {
      color: var(--z5);
    }

    /* ── Badge Styles ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .badge-stepback {
      color: var(--warning);
      background: rgba(255, 214, 10, 0.1);
      border: 1px solid rgba(255, 214, 10, 0.2);
    }
  </style>
</head>
<body>

  <section id="hero">
    <div class="container"></div>
  </section>

  <section id="overview" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-1" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-2" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-3" class="section">
    <div class="container"></div>
  </section>

  <section id="phase-4" class="section">
    <div class="container"></div>
  </section>

  <section id="course-map" class="section">
    <div class="container"></div>
  </section>

  <section id="race-day" class="section">
    <div class="container"></div>
  </section>

  <section id="hill-programming" class="section">
    <div class="container"></div>
  </section>

  <section id="strength" class="section">
    <div class="container"></div>
  </section>

  <section id="nutrition" class="section">
    <div class="container"></div>
  </section>

  <section id="risk-management" class="section">
    <div class="container"></div>
  </section>

</body>
</html>
